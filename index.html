<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call of Duty: WWII - Xbox</title>
    <link rel="stylesheet" href="style.css" />
  <base target="_blank">
</head>
  <body>
    <header>
      <div class="logo">
        <img src="./pictures/xbox.png" alt="Xbox" />
      </div>
      
      <!-- Чекбокс для управления мобильным меню -->
      <input type="checkbox" id="menu-toggle" class="menu-toggle" />
      
      <!-- Гамбургер-иконка -->
      <label for="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      
      <div class="right">
        <nav>
          <a href="#">Games</a>
          <a href="#">Consoles</a>
          <a href="#">Community</a>
        </nav>
        <div class="search-bar">
          <input type="text" placeholder="Search" />
        </div>
        <div class="my-xbox">
          <img src="./img/user.png" alt="" />
          My XBOX
        </div>
      </div>
    </header>
  </body>
</html>
